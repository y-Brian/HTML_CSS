<!DOCTYPE html>

<!--Aula 2 - Cartão de produtos
Objetivo: Criar um cartão de produto responsivo usando CSS felxbox e estilos avançadso -->

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 02 - Cartão de Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--Area do conteúdo principal-->
<main>

    <!--Conteiner principal
    Div wrapper usado para centralizar o cartão da página
    O css (display:flex) vai centralizar este elemento-->
<div class="conteiner">

    <!--Cartão de produto (Produc Card)
    Estrutura que contém: imagem, título, descrição, preço e botão de compra
    Este é o padrão comum em e-comerce-->
<div class="product-card"> 
    <!--Imagem do produto-->
     <!-- SRC: URL da imagem
      alt: texto alternativo caso a imagem falhe-->

<img src="./Pc.jpg"  alt="Computador gamer">


<!--Conteúdo interno do cartão-->

<div class="card-content">

    <h3>PC Gamer Completo Intel Core I7 3.4GHz 16GB DDR3 SSD 480GB Monitor 19" Kit Gamer - Escolha a placa de vídeo (ONBOARD)</h3>

    <p> O PC gamer mais custo benéficio do mercado, incluso com placa de vídeo.</p>

    <!--Preço do produto-->
    <span class="price">R$2.499,99</span>

<a href="a" class="buy btn">Comprar agora</a>


</div>
</div>

</div>


</main>



    </body>
</html>
