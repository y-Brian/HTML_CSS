<!--Estrutura para comentario-->
<!doctype html>
<!-- Elemento raiz do documeto HTML, com idioma em portugues do Brasil -->
<html lang="pt-br">
  <!-- Define o cabeçario da pagina -->
  <head>
    <!-- Define a codificação de caracteres UTF-8 -->
    <meta charset="UTF-8" />
    <!-- Define o título na aba do navegador -->
    <title>Estrutura HTML</title>
  </head>

  <!-- Tag Estrutura da nossa pagina (corpo da pagina) -->
  <body>
    <!-- Tag de titulo principal-->
    <h1>Ola, Mundo!</h1>
    <!-- Tag de paragrafo do nosso site-->
    <p>Minha primeira pagina em HTML</p>
  </body>
</html>
