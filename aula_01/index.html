<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 01 - Página de Boas Vindas</title>
    <!-- link que liga a página html ao arquivo de css e aplica os estilos visuais -->
    <link rel="stylesheet" href="./CSS/style.css">
</head>
<body> 
<!-- Cabeçalho da página (header)-->
 <!-- Seção usada para titulos principais e contúdo do topo-->
    <header>
        <!-- Titulo principal da pagina (h1) - deve ter apenas UM por página -->
<h1>Bem-Vindo ao Nosso Curso!</h1>
    </header>
    <!-- Conteúdo Principal (main)-->
     <!-- Seção para o conteúdo central/principal da pagina -->
    <main>
        <!-- imagem de Feliz dias das Mães --> 
         <!-- a propriedade src é o caminho da imagem e o alt seria o texto alternativo caso a imagem falhe-->
        <img src="./img/Imagem aula01.jpg" alt="imagem de feliz dia das mães">
        <!-- Parágrafo de introdução -->
        <p>Estamos muito felizes em ter vocês aqui. Prepare-se para mergulhar no mundo de desenvolvimento web! </p>

        <!-- Tag usada para redirecionar para outra página ou arquivo-->
        <a class="button" href="#">Começar Agora</a>
    </main>
<!-- Rodapé da página (footer)-->
 <!-- Seção semântica para informações de rodapé (copyright, links, etc)-->
    <footer>
        <p>&copy; 2026 Todos os direitos reservados. Desenvolvido por [Bryan].</p>
    </footer>
</body>
</html>
